<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codenames — Multi-Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

<!-- ─── SETUP SCREEN ──────────────────────────────────────────── -->
<div id="setup-screen" class="screen active">
    <div class="setup-card">
        <h1 id="title">🕵️ Codenames</h1>
        <p id="subtitle" class="subtitle">Multi-Agent Board Game</p>

        <div class="lang-toggle">
            <button class="btn-lang active" data-lang="en">English</button>
            <button class="btn-lang" data-lang="ar">العربية</button>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label id="lbl-size">Board Size</label>
                <select id="board-size">
                    <option value="15">15 (Fast)</option>
                    <option value="25" selected>25 (Classic)</option>
                    <option value="35">35 (Large)</option>
                </select>
            </div>
            <div class="form-group">
                <label id="lbl-diff">Difficulty</label>
                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label id="lbl-cat">Category <span class="hint">(optional)</span></label>
            <input type="text" id="category" placeholder="" />
        </div>

        <div class="form-row">
            <div class="form-group">
                <label id="lbl-team">Team</label>
                <div class="radio-group">
                    <label class="radio-card red"><input type="radio" name="team" value="red" /> <span id="lbl-red">Red</span></label>
                    <label class="radio-card blue selected"><input type="radio" name="team" value="blue" checked /> <span id="lbl-blue">Blue</span></label>
                </div>
            </div>
            <div class="form-group">
                <label id="lbl-role">Role</label>
                <div class="radio-group">
                    <label class="radio-card"><input type="radio" name="role" value="spymaster" /> <span id="lbl-spy">Spymaster</span></label>
                    <label class="radio-card selected"><input type="radio" name="role" value="operative" checked /> <span id="lbl-op">Operative</span></label>
                </div>
            </div>
        </div>

        <button id="btn-start" class="btn-primary">
            <span id="btn-start-text">Start Game</span>
            <span id="btn-start-loading" class="spinner hidden"></span>
        </button>
    </div>
</div>

<!-- ─── GAME SCREEN ───────────────────────────────────────────── -->
<div id="game-screen" class="screen">
    <!-- header -->
    <header class="game-header">
        <div class="score red-score"><span class="dot red"></span> <span id="red-count">0</span></div>
        <div class="turn-indicator" id="turn-indicator">—</div>
        <div class="score blue-score"><span class="dot blue"></span> <span id="blue-count">0</span></div>
    </header>

    <!-- main game area -->
    <div class="game-body">
        <!-- LEFT: Agent Log Panel (toggleable) -->
        <aside id="log-panel" class="log-panel">
            <div class="panel-header">
                <h3 id="lbl-log">🧠 Agent Logs</h3>
                <button id="btn-toggle-log" class="btn-toggle" title="Hide logs">✕</button>
            </div>
            <ul id="log-list"></ul>
        </aside>

        <!-- CENTER: Board -->
        <div class="board-area">
            <div id="board" class="board"></div>

            <!-- clue display -->
            <div id="clue-display" class="clue-display hidden">
                <span id="clue-text"></span>
            </div>

            <!-- action bar -->
            <div id="action-bar" class="action-bar hidden">
                <!-- spymaster clue form -->
                <div id="clue-form" class="clue-form hidden">
                    <input type="text" id="clue-input" placeholder="Clue word" />
                    <input type="number" id="clue-number" min="0" max="9" value="1" />
                    <button id="btn-clue" class="btn-primary small">Give Clue</button>
                </div>
                <!-- operative controls -->
                <div id="guess-controls" class="guess-controls hidden">
                    <button id="btn-pass" class="btn-secondary">Pass</button>
                </div>
            </div>

            <!-- AI thinking bar -->
            <div id="ai-thinking" class="ai-thinking hidden">
                <div class="thinking-bar"></div>
                <span id="ai-thinking-text">AI is thinking…</span>
            </div>
        </div>

        <!-- RIGHT: Chat Panel -->
        <aside id="chat-panel" class="chat-panel">
            <div class="panel-header">
                <h3 id="lbl-chat">💬 Agent Chat</h3>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
        </aside>
    </div>

    <!-- floating toggle buttons -->
    <div class="floating-toggles">
        <button id="btn-show-log" class="btn-float hidden" title="Show agent logs">🧠</button>
        <button id="btn-show-chat" class="btn-float hidden" title="Show chat">💬</button>
    </div>

    <!-- game over overlay -->
    <div id="game-over" class="game-over-overlay hidden">
        <div class="game-over-card">
            <h2 id="game-over-title"></h2>
            <p id="game-over-msg"></p>
            <button id="btn-new-game" class="btn-primary">New Game</button>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
